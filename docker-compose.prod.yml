# Дополнительный docker-compose файл с prod конфигурацией.
# Самостоятельно не используется.
# Запускать только вместе с базовым docker-compose.yml.
#
# Пример:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up

services:
  postgres:
    env_file:
      - .env.prod

  # Контейнер для подготовки среды бекенда (миграции и сборка статики)
  studyoverflow-init:
    build:
      context: ./studyoverflow
      dockerfile: Dockerfile
      target: prod-image
    image: studyoverflow:prod
    container_name: studyoverflow-init
    # Контейнер останавливается после выполнения команд и не перезапускается
    restart: "no"
    env_file:
      - .env.prod
    networks:
      - dbnet
    volumes:
      - staticfiles:/app/studyoverflow/staticfiles
    # Контейнер запускается от root, нужно для выполнения chown (смены прав каталога)
    user: root
    # 1) Передаются права на каталог пользователю userdj.
    # 2) Выполняются миграции БД.
    # 3) Собираются статические файлы.
    command: >
      sh -c "chown -R userdj:groupdjango /app/studyoverflow/staticfiles &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  studyoverflow-1:
    image: studyoverflow:prod
    # --proxy-headers - Daphne доверяет заголовкам запроса, который присылает Nginx
    command: daphne --proxy-headers -b 0.0.0.0 -p 8000 studyoverflow.asgi:application
    env_file:
      - .env.prod
    volumes:
      - staticfiles:/app/studyoverflow/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      studyoverflow-init:
        condition: service_completed_successfully

  studyoverflow-2:
    image: studyoverflow:prod
    container_name: studyoverflow-2
    restart: unless-stopped
    command: daphne --proxy-headers -b 0.0.0.0 -p 8000 studyoverflow.asgi:application
    volumes:
      - staticfiles:/app/studyoverflow/staticfiles
    env_file:
      - .env.prod
    networks:
      - dbnet
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      studyoverflow-init:
        condition: service_completed_successfully

  celery-worker:
    image: studyoverflow:prod
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      studyoverflow-init:
        condition: service_completed_successfully

  celery-beat:
    image: studyoverflow:prod
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      studyoverflow-init:
        condition: service_completed_successfully

  grafana:
    env_file:
      - .env.prod
    environment:
      # Домен, на котором доступна Grafana
      - GF_SERVER_DOMAIN=${SITE_DOMAIN}
      # Базовый URL, по которому пользователи заходят в Grafana (нужен, чтобы Grafana правильно строила пути к своим файлам)
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      # Разрешает Grafana отдавать контент по вложенному пути (например /grafana/), а не из корня домена (/)
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

  nginx:
    build: ./nginx
    container_name: nginx-server
    restart: unless-stopped
    networks:
      - dbnet
    ports:
      - "80:80"
    expose:
      - 80
    volumes:
      - staticfiles:/app/studyoverflow/staticfiles:ro
    depends_on:
      - studyoverflow-1
      - studyoverflow-2
