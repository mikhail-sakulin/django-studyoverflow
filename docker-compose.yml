# Базовый docker-compose файл.
# Самостоятельно не используется.
# Запускать только вместе с одним из других файлов конфигурации (dev или prod):
#   docker-compose.dev.yml
#   docker-compose.prod.yml
#
# Примеры:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up
# docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up

services:
  postgres:
    image: postgres:17-alpine
    container_name: psgr
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dbnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - dbnet
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  studyoverflow-1:
    image: studyoverflow
    container_name: studyoverflow-1
    restart: unless-stopped
    networks:
      - dbnet
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    image: studyoverflow
    restart: unless-stopped
    command: celery -A studyoverflow worker -l info
    networks:
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    image: studyoverflow
    restart: unless-stopped
    command: celery -A studyoverflow beat -l info --schedule=/app/studyoverflow/celerybeat_data/celerybeat-schedule
    volumes:
      - celery_beat_data:/app/studyoverflow/celerybeat_data
    networks:
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  loki:
    build: ./monitoring/loki
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
    command:
      -config.file=/etc/loki/config.yml
    networks:
      - dbnet

  promtail:
    build: ./monitoring/promtail
    container_name: promtail
    restart: unless-stopped
    volumes:
      - promtail-data:/run/promtail
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dbnet
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - dbnet
    depends_on:
      - loki

networks:
  dbnet:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  staticfiles:
  celery_beat_data:
  promtail-data:
  loki-data:
  grafana-data:
