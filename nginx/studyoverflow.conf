# map - аналог if/else,
# создается переменная $connection_upgrade, значение которой динамически зависит от входящего заголовка $http_upgrade
# 1) Если клиент пришел с обычным протоколом http/https (заголовка Upgrade нет - он задается Nginx пустой строкой ("")), то $connection_upgrade
# принимает значение close (нет смены протокола),
# 2) Если клиент хочет установить WebSocket-соединение, то заголовок Upgrade: websocket,
# Nginx сопоставляет это со значением по умолчанию (default, других совпадений нет) и записывает в переменную $connection_upgrade значение upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

# Группа контейнеров для балансировки запросов между ними
upstream studyoverflow_backend {
    # ip_hash; при разработке и использовании Django Debug ToolBar,
    # ip_hash — закрепляет пользователя за конкретным сервером по IP
    # least_conn; для продакшена, следующий запрос тому, у кого меньше активных соединений
    least_conn;

    server studyoverflow-1:8000;
    server studyoverflow-2:8000;

    # Постоянное TCP соединение между между Nginx и бекендом (studyoverflow)
    # 32 - максимальное количество открытых соединений с бекендом на каждый сервер, пул соединений
    keepalive 32;
}

server {
    # Порт, который слушает Nginx на всех доступных сетевых интерфейсах (и всех IP, listen 0.0.0.0:80;)
    listen 80;
    # Добавляет кодировку в HTTP-заголовок ответа Content-Type для браузера
    charset utf-8;
    # Список доменов (HTTP-заголовок Host), для которых Nginx будет обрабатывать запросы в этом блоке (server)
    server_name localhost studyoverflow.ru;

    # Максимальный размер загружаемых файлов
    client_max_body_size 20M;

    # Настройка сжатия Gzip для экономии сетевого трафика и увеличения скорости передачи данных
    gzip on;
    # Типы сжтимаемых данных
    gzip_types text/plain text/css application/json application/javascript text/xml;
    # Файлы меньше 1 КБ не сжимаются (их сжимать невыгодно)
    gzip_min_length 1000;

    # Логи: перенаправление вывода в stdout/stderr (для сбора Docker-ом)
    # /dev - системная папка в Linux, в которой лежат виртуальные устройства.
    # Писать данные в файлы внутри /dev - значит отправлять данные какому-то устройству или передавать их ОС
    # Docker daemon читает эти каналы вывода и сохраняет логи оттуда на хосте, после удаления контейнера они также удаляются
    # В текущем проекте присутствует promtail, который читает логи Docker и отправляет их loki
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # HTTP/1.1 для поддержки websocket и keepalive (пул соединений Nginx с бекендом)
    proxy_http_version 1.1;

    # Основной reverse proxy для входящих запросов
    location / {
        # Запросы прокидываются в upstream группу Django (studyoverflow)
        proxy_pass http://studyoverflow_backend;

        # В заголовках передается оригинальный Host из запроса клиента
        proxy_set_header Host $host;
        # В заголовках передается оригинальный IP клиента
        proxy_set_header X-Real-IP $remote_addr;
        # В заголовках передается цепочка прокси IP от самого клиента до Nginx
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # В заголовках передается протокол, по которому обратился клиент (http/https, для установления вебсокет-соединения используется сначала http)
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймаут на подключение к бекенду Django (studyoverflow)
        # Сколько Nginx пробует установить TCP-соединение с бекендом
        proxy_connect_timeout 10s;
        # Таймаут отправки запроса бекенду
        # Сколько Nginx будет ждать ответа, если бекенд перестанет принимать пакеты
        proxy_send_timeout 300s;
        # Таймаут ожидания ответа от бекенда
        proxy_read_timeout 300s;

        # Отключена автоматическая перезапись заголовков редиректа (Location) от бэкенда
        # Не требуется, поскольку бекенд получает верный Host благодаря proxy_set_header
        proxy_redirect off;
    }

    # reverse proxy для WebSocket
    location /ws/ {
        # Запросы прокидываются в upstream группу Django (studyoverflow)
        proxy_pass http://studyoverflow_backend;

        # Поддержка WebSocket upgrade
        # В заголовках передается заголовок Upgrade (со значением "websocket" или заголовка не будет, тогда Nginx воспримет переменную как "")
        proxy_set_header Upgrade $http_upgrade;
        # В заголовках передается заголовок Connection (со значением переменной $connection_upgrade из блока map)
        proxy_set_header Connection $connection_upgrade;

        # Заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Отключена буферизация, обязательно для вебсокетов
        # Nginx передает данные моментально, а не копит их в буфере в ожидании конца ответа
        proxy_buffering off;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # Отдельная обработка favicon без бекенда ("=" из-за конкретного пути для конкретного файла)
    location = /favicon.ico {
        # Файл отдается напрямую самим Nginx
        alias /app/studyoverflow/staticfiles/img/favicon.ico;

        # Запросы к favicon не логируются
        access_log off;
        # Не логируется отсутствие файла
        log_not_found off;
    }

    # Статические файлы Django (после команды collectstatic)
    location /static/ {
        # Путь к директории, в которую собирается статика
        alias /app/studyoverflow/staticfiles/;

        # Кеширование статики у клиента, добавляет заголовок Expires
        expires 7d;
        # Установка заголовка для кеширования
        add_header Cache-Control "public, no-transform";
        # Запросы к статике не логируются
        access_log off;
    }
}